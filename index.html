<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantoConstruct</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load libraries first -->
    <script src="lib/csg.js"></script>
    <!-- Then load our modules -->
    <script src="sketch.js"></script>
    <script src="objExporter.js"></script>
    <script src="geometry.js"></script>
    <script src="app.js"></script>
</head>
<body>

    <path class="st1" d="M161.2,421.9c-24.9,1.4-51.9-4-79.9-19.1-1.7,20.7-.3,75.5,30.6,129.7,30.9,54.2,56.2,50.7,76.4,52.7,39.1,3.9,75.3-1.6,107.3-14.6"/>

    <!-- Top bar with all controls merged -->
    <div class="top-bar">
        <div class="sketch-dropdown-group">
            <select id="sketchDropdown" class="sketch-dropdown">
                <option value="" disabled selected>Load Sketch...</option>
            </select>
        </div>
        <div class="sketch-button-group">
            <button id="newSketchBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg> New Sketch</button>
            <button id="saveBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M840-680v480q0 33-23.5 56.5T760-120H200q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h480l160 160Zm-80 34L646-760H200v560h560v-446ZM565-275q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35ZM240-560h360v-160H240v160Zm-40-86v446-560 114Z"/></svg> Save</button>
            <button id="downloadSketchBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="m648-140 112-112v92h40v-160H640v40h92L620-168l28 28Zm-448 20q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v268q-19-9-39-15.5t-41-9.5v-243H200v560h242q3 22 9.5 42t15.5 38H200Zm0-120v40-560 243-3 280Zm80-40h163q3-21 9.5-41t14.5-39H280v80Zm0-160h244q32-30 71.5-50t84.5-27v-3H280v80Zm0-160h400v-80H280v80ZM720-40q-83 0-141.5-58.5T520-240q0-83 58.5-141.5T720-440q83 0 141.5 58.5T920-240q0 83-58.5 141.5T720-40Z"/></svg> Export JSON</button>
            <button id="loadFromFileBtn" class="secondary"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M440-200h80v-167l64 64 56-57-160-160-160 160 57 56 63-63v167ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"/></svg> Load from JSON</button>
        </div>
        <div class="action-buttons">
            <button id="undoBtn" title="Undo (Ctrl+Z)" disabled><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M280-200v-80h284q63 0 109.5-40T720-420q0-60-46.5-100T564-560H312l104 104-56 56-200-200 200-200 56 56-104 104h252q97 0 166.5 63T800-420q0 94-69.5 157T564-200H280Z"/></svg></button>
            <button id="redoBtn" title="Redo (Ctrl+Y)" disabled><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M396-200q-97 0-166.5-63T160-420q0-94 69.5-157T396-640h252L544-744l56-56 200 200-200 200-56-56 104-104H396q-63 0-109.5 40T240-420q0 60 46.5 100T396-280h284v80H396Z"/></svg></button>
            <button id="resetViewBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-320v-100q0-25 17.5-42.5T540-480h100v60H540v100h-60Zm60 240q-25 0-42.5-17.5T480-140v-100h60v100h100v60H540Zm280-240v-100H720v-60h100q25 0 42.5 17.5T880-420v100h-60ZM720-80v-60h100v-100h60v100q0 25-17.5 42.5T820-80H720Zm111-480h-83q-26-88-99-144t-169-56q-117 0-198.5 81.5T200-480q0 72 32.5 132t87.5 98v-110h80v240H160v-80h94q-62-50-98-122.5T120-480q0-75 28.5-140.5t77-114q48.5-48.5 114-77T480-840q129 0 226.5 79.5T831-560Z"/></svg> Reset View</button>
            <button id="downloadBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="m720-80 120-120-28-28-72 72v-164h-40v164l-72-72-28 28L720-80ZM480-800 243-663l237 137 237-137-237-137ZM120-321v-318q0-22 10.5-40t29.5-29l280-161q10-5 19.5-8t20.5-3q11 0 21 3t19 8l280 161q19 11 29.5 29t10.5 40v159h-80v-116L479-434 200-596v274l240 139v92L160-252q-19-11-29.5-29T120-321ZM578.5-58.5Q520-117 520-200t58.5-141.5Q637-400 720-400t141.5 58.5Q920-283 920-200T861.5-58.5Q803 0 720 0T578.5-58.5ZM480-491Z"/></svg> Download OBJ</button>
            <button id="clearBtn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="m376-300 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 180q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Z"/></svg> Clear Sketch</button>
        </div>
    </div>

    <!-- Vertical toolbar on the left -->
    <div class="vertical-toolbar">
        <div class="tool-item" data-tool="line">
            <button class="tool-btn active" data-tool="line" title="Hallway Tool (H)"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M760-80q-50 0-85-35t-35-85q0-14 3-27t9-25L252-652q-12 6-25 9t-27 3q-50 0-85-35t-35-85q0-50 35-85t85-35q50 0 85 35t35 85q0 14-3 27t-9 25l400 400q12-6 25-9t27-3q50 0 85 35t35 85q0 50-35 85t-85 35Z"/></svg></button>
            <span class="tool-label">Hallway [L]</span>
        </div>
        <div class="tool-item" data-tool="polygon">
            <button class="tool-btn" data-tool="polygon" title="Polygon Tool (P)"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M298-200h364l123-369-305-213-305 213 123 369Zm-58 80L80-600l400-280 400 280-160 480H240Zm240-371Z"/></svg></button>
            <span class="tool-label">Polygon Room [P]</span>
        </div>
        <div class="tool-item" data-tool="rectangle">
            <button class="tool-btn" data-tool="rectangle" title="Rectangle Tool (R)"><img src="icons/rectangle_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.svg" alt="Rectangle"></button>
            <span class="tool-label">Rectangular Room [R]</span>
        </div>
        <div class="tool-item" data-tool="move">
            <button class="tool-btn" data-tool="move" title="Move Vertex (M)"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M479-359q-50 0-85-35t-35-85q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35Zm0 279L309-250l57-57 114 114 113-113 56 56L479-80ZM249-309 79-479l170-170 57 57-114 114 113 113-56 56Zm116-345-56-56 170-170 170 170-57 57-114-114-113 113Zm344 345-57-57 114-114-113-113 56-56 170 170-170 170Z"/></svg></button>
            <span class="tool-label">Move Element [M]</span>
        </div>
        <div class="tool-item" data-tool="delete">
            <button class="tool-btn" data-tool="delete" title="Delete Tool (D)"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg></button>
            <span class="tool-label">Delete [D]</span>
        </div>
    </div>

    <div class="status-bar">
        <span id="sketchNameIndicator"></span>
        <span id="pointCount">Points: 0</span> |
        <span id="segmentCount">Segments: 0</span> |
        <span id="gridSize">Grid: 1.0mm/10.0mm</span> |
        <span id="statusMessage">Ready</span>
    </div>

    <!-- Unsaved Changes Confirmation Modal -->
    <div id="unsavedModal" class="modal-overlay" hidden>
        <div class="modal">
            <h3>Unsaved Changes</h3>
            <p>You have unsaved changes. What would you like to do?</p>
            <div class="modal-buttons">
                <button id="unsavedSaveBtn" class="btn-primary">Save Current</button>
                <button id="unsavedDiscardBtn" class="btn-secondary">Discard</button>
                <button id="unsavedCancelBtn" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Save Modal -->
    <div id="saveModal" class="modal-overlay" hidden>
        <div class="modal">
            <h3>Save Sketch</h3>
            <input type="text" id="sketchNameInput" class="modal-input" placeholder="Enter sketch name">
            <div class="modal-buttons">
                <button id="saveConfirmBtn" class="btn-primary">Save</button>
                <button id="saveCancelBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- File Import (hidden) -->
    <input type="file" id="fileImportInput" accept=".json" hidden>
</body>
</html>
