<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Extrusion Tool</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load libraries first -->
    <script src="lib/csg.js"></script>
    <!-- Then load our modules -->
    <script src="sketch.js"></script>
    <script src="objExporter.js"></script>
    <script src="geometry.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <h1>Maze Extrusion Tool</h1>
        <p class="subtitle">Draw 2D hallways and polygons, extrude with cutouts, export as OBJ</p>
        
        <div class="tool-selector">
            <button class="tool-btn active" data-tool="line" title="Line Tool (L)">Line</button>
            <button class="tool-btn" data-tool="polygon" title="Polygon Tool (P)">Polygon</button>
            <button class="tool-btn" data-tool="move" title="Move Vertex (M)">Move</button>
            <button class="tool-btn" data-tool="delete" title="Delete Tool (D)">Delete</button>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="extrusionHeight">Extrusion Height (mm):</label>
                <input type="number" id="extrusionHeight" value="10" min="0.1" step="0.1">
            </div>
            <div class="control-group">
                <label for="hallwayWidth">Hallway Width (mm):</label>
                <input type="number" id="hallwayWidth" value="5" min="0.1" step="0.1">
            </div>
            <div class="control-group">
                <label for="gridGranularity">Grid Granularity:</label>
                <div class="slider-container">
                    <input type="range" id="gridGranularity" min="0.1" max="2" step="0.1" value="1">
                    <span id="granularityValue">1.0</span>
                </div>
            </div>
            <div class="button-group">
                <button id="resetViewBtn">Reset View</button>
                <button id="deleteBtn">Delete Mode</button>
                <button id="extrudeBtn">Generate 3D Model</button>
                <button id="downloadBtn" disabled>Download OBJ</button>
                <button id="clearBtn">Clear Sketch</button>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="sketchCanvas"></canvas>
            <svg id="emberAreaOverlay" class="overlay-svg" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 597.4 597.4">
  <defs>
    <style>
      .st0 { fill: #c9cbcc; opacity: .2; }
      .st1 { fill: none; stroke: #000; stroke-miterlimit: 10; }
    </style>
  </defs>
  <path class="st0" d="M293.1,308.5c-26.7,42.7-78.1,77.2-140.8,69.2,8.3,54.7,35.2,102.9,79.6,146.7,44.4,43.7,105.8,67.9,177.1,60.8,20.3-2,45.6,1.5,76.4-52.7,30.9-54.2,32.3-109,30.6-129.7-108.9,58.8-201.7-29.4-215.6-92.3"/>
  <path class="st0" d="M304.3,308.5c26.7,42.7,78.1,77.2,140.8,69.2-8.3,54.7-35.2,102.9-79.6,146.7-44.4,43.7-105.8,67.9-177.1,60.8-20.3-2-45.6,1.5-76.4-52.7-30.9-54.2-32.3-109-30.6-129.7,108.9,58.8,201.7-29.4,215.6-92.3"/>
  <g>
    <path class="st1" d="M278.1,556.4"/>
    <path class="st1" d="M296.9,310.7c-10.3,45.7-62,104.7-131.3,110.9"/>
    <path class="st1" d="M301.9,567.9c23.8-10.6,45.2-25.4,63.6-43.5,31.4-30.9,54-64.1,67.5-100.2"/>
    <path class="st1" d="M434.8,419.3c4.7-13.5,8.2-27.3,10.3-41.6-62.7,7.9-114.1-26.5-140.8-69.2"/>
    <path class="st1" d="M161.2,421.9c-24.9,1.4-51.9-4-79.9-19.1-1.7,20.7-.3,75.5,30.6,129.7,30.9,54.2,56.2,50.7,76.4,52.7,39.1,3.9,75.3-1.6,107.3-14.6"/>
  </g>
  <path class="st1" d="M293.1,308.5c-26.7,42.7-78.1,77.2-140.8,69.2,8.3,54.7,35.2,102.9,79.6,146.7,44.4,43.7,105.8,67.9,177.1,60.8,20.3-2,45.6,1.5,76.4-52.7,30.9-54.2,32.3-109,30.6-129.7-108.9,58.8-201.7-29.4-215.6-92.3"/>
  <circle cx="298.7" cy="298.7" r="6"/>
</svg>
        </div>
        
        <div class="status-bar">
            <span id="pointCount">Points: 0</span> |
            <span id="segmentCount">Segments: 0</span> |
            <span id="gridSize">Grid: 1.0mm/10.0mm</span> |
            <span id="statusMessage">Ready</span>
        </div>
    </div>
</body>
</html>
